<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIStockChart</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #a0a0c0; }
    #app { display: flex; flex-direction: column; height: 100vh; }

    /* 顶部导航 */
    .header {
      display: flex; align-items: center; gap: 24px;
      padding: 12px 24px; border-bottom: 1px solid #2a2a4a;
      background: #16162b;
    }
    .header .logo { font-size: 18px; font-weight: 700; color: #fff; }
    .header .logo span { color: #4d96ff; }
    .nav-tabs { display: flex; gap: 4px; }
    .nav-tab {
      padding: 6px 20px; border-radius: 4px; cursor: pointer;
      font-size: 14px; color: #8888aa; background: none; border: none;
    }
    .nav-tab:hover { color: #c0c0e0; }
    .nav-tab.active { background: #4a4aff; color: #fff; }

    /* 示例页 */
    .page { display: none; flex: 1; overflow: hidden; }
    .page.active { display: flex; }

    /* 左侧示例列表 */
    .sidebar {
      width: 260px; border-right: 1px solid #2a2a4a;
      overflow-y: auto; background: #16162b; padding: 12px 0;
    }
    .sidebar-item {
      padding: 10px 20px; cursor: pointer; font-size: 13px;
      color: #8888aa; border-left: 3px solid transparent;
    }
    .sidebar-item:hover { color: #c0c0e0; background: #1e1e38; }
    .sidebar-item.active {
      color: #fff; border-left-color: #4d96ff;
      background: #1e1e38;
    }

    /* 右侧内容 */
    .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .example-toolbar {
      display: flex; gap: 8px; padding: 12px 16px;
      align-items: center; border-bottom: 1px solid #2a2a4a; flex-wrap: wrap;
    }
    .example-toolbar button {
      padding: 5px 14px; border: 1px solid #3a3a5c; background: #252540;
      color: #a0a0c0; border-radius: 4px; cursor: pointer; font-size: 12px;
    }
    .example-toolbar button.active { background: #4a4aff; color: #fff; border-color: #4a4aff; }
    .example-toolbar button:hover { background: #353560; }

    .example-body { flex: 1; display: flex; overflow: hidden; }
    #chart-container { flex: 1; min-width: 0; }
    .code-panel {
      width: 420px; border-left: 1px solid #2a2a4a;
      overflow-y: auto; background: #12122a; padding: 16px;
      font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px;
      line-height: 1.6; white-space: pre-wrap; color: #c0c0e0;
    }

    /* 文档页 */
    .doc-page { flex: 1; overflow-y: auto; padding: 32px 48px; }
    .doc-page h1 { color: #fff; font-size: 28px; margin-bottom: 8px; }
    .doc-page h2 { color: #fff; font-size: 20px; margin: 28px 0 12px; padding-top: 16px; border-top: 1px solid #2a2a4a; }
    .doc-page h3 { color: #4d96ff; font-size: 16px; margin: 20px 0 8px; }
    .doc-page p { margin: 8px 0; line-height: 1.7; }
    .doc-page code {
      background: #252540; padding: 2px 6px; border-radius: 3px;
      font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; color: #ffd93d;
    }
    .doc-page pre {
      background: #12122a; border: 1px solid #2a2a4a; border-radius: 6px;
      padding: 16px; margin: 12px 0; overflow-x: auto;
      font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px;
      line-height: 1.6; color: #c0c0e0;
    }
    .doc-page table {
      width: 100%; border-collapse: collapse; margin: 12px 0;
    }
    .doc-page th {
      text-align: left; padding: 8px 12px; background: #252540;
      color: #fff; font-size: 13px; border: 1px solid #2a2a4a;
    }
    .doc-page td {
      padding: 8px 12px; border: 1px solid #2a2a4a; font-size: 13px;
    }
    .doc-page td code { background: none; padding: 0; color: #ffd93d; }
    .doc-page .type-tag {
      background: #3a3a5c; padding: 1px 6px; border-radius: 3px;
      font-size: 11px; color: #a0a0c0;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="header">
      <div class="logo">AI<span>StockChart</span></div>
      <div class="nav-tabs">
        <button class="nav-tab active" data-page="examples">示例</button>
        <button class="nav-tab" data-page="docs">技术文档</button>
      </div>
    </div>

    <!-- 示例页 -->
    <div class="page active" id="page-examples">
      <div class="sidebar">
        <div class="sidebar-item active" data-example="kline-basic">基础K线图</div>
        <div class="sidebar-item" data-example="kline-ma">MA均线指标</div>
        <div class="sidebar-item" data-example="kline-boll">BOLL布林带</div>
        <div class="sidebar-item" data-example="kline-period">日K/周K/月K切换</div>
        <div class="sidebar-item" data-example="tick-basic">基础分时图</div>
        <div class="sidebar-item" data-example="tick-area">分时面积图</div>
        <div class="sidebar-item" data-example="tick-visible">分时部分数据</div>
        <div class="sidebar-item" data-example="switch">K线/分时切换</div>
      </div>
      <div class="content">
        <div class="example-toolbar" id="example-toolbar"></div>
        <div class="example-body">
          <div id="chart-container"></div>
          <div class="code-panel" id="code-panel"></div>
        </div>
      </div>
    </div>

    <!-- 文档页 -->
    <div class="page" id="page-docs">
      <div class="doc-page" id="doc-content"></div>
    </div>
  </div>
  <script type="module" src="/src/demo.ts"></script>
</body>
</html>
